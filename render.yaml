services:
  - type: web
    name: video-ad-agent
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: OPENROUTER_MODEL
        value: anthropic/claude-3.7-sonnet
      - key: SHOPIFY_API_VERSION
        value: 2024-10
